<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Discover ERNIE Image Prompts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#040a04;
      --bg-card:#0a1a0a;
      --bg-card-hover:#122212;
      --green-crt:#88ee88;
      --green-dim:#4a8a4a;
      --green-glow:rgba(136,238,136,0.15);
      --cyan:#00e5ff;
      --cyan-dim:rgba(0,229,255,0.12);
      --text:#e0e0e6;
      --text-dim:#8888a0;
      --accent:#88ee88;
      --border:#1e1e2e;
      --font-mono:'Space Mono','Courier New',monospace;
      --font-crt:'VT323',monospace;
      --font-body:'Inter',-apple-system,sans-serif;
    }
    html { scroll-behavior:smooth; }
    body { background:var(--bg); color:var(--text); font-family:var(--font-body); line-height:1.7; overflow-x:hidden; }
    ::selection { background:var(--green-crt); color:var(--bg); }

    /* ===== NAV ===== */
    .nav {
      position:fixed; top:0; left:0; right:0; z-index:1000;
      display:flex; align-items:center; justify-content:space-between;
      padding:.8rem 2.5rem;
      background:rgba(4,10,4,.25);
      backdrop-filter:blur(8px);
      border-bottom:1px solid rgba(30,30,46,.3);
    }
    .nav-logo { font-family:var(--font-crt); font-size:1.5rem; color:var(--green-crt); text-shadow:0 0 10px var(--green-glow); letter-spacing:2px; }
    .nav-logo span { color:rgba(136,238,136,.5); font-size:.85rem; margin-left:.5rem; letter-spacing:0; }
    .nav-count { font-family:var(--font-mono); font-size:.8rem; color:rgba(136,238,136,.5); }
    .nav-count b { color:var(--green-crt); }

    /* ===== HERO ===== */
    .hero {
      position:relative; display:flex; align-items:center; justify-content:center;
      min-height:100vh; padding:6rem 2rem 4rem; overflow:hidden; background:#040a04;
    }
    /* Morse canvas background */
    #heroCanvas { position:absolute; inset:0; z-index:1; width:100%; height:100%; }
    .hero::before {
      content:''; position:absolute; inset:0; z-index:3; pointer-events:none;
      background:repeating-linear-gradient(0deg,rgba(0,0,0,.10) 0px,rgba(0,0,0,.10) 1px,transparent 1px,transparent 4px);
    }
    .hero::after {
      content:''; position:absolute; inset:0; z-index:3; pointer-events:none;
      background:radial-gradient(ellipse 80% 75% at 50% 50%,transparent 20%,rgba(15,10,5,.30) 65%,rgba(10,6,2,.70) 100%);
    }
    .hero-scanline { display:none; }
    /* 居中不限宽，让 nowrap 标题自然撑开并居中 */
    .hero-content { position:relative; z-index:5; text-align:center; width:90vw; }
    .crt-title {
      font-family:var(--font-crt); font-size:clamp(1.8rem,4.8vw,4.8rem);
      color:var(--green-crt); letter-spacing:4px; line-height:1.05; margin-bottom:.4rem;
      white-space:nowrap;
      text-shadow:0 0 30px rgba(136,238,136,.45),0 0 60px rgba(136,238,136,.2),0 0 120px rgba(136,238,136,.08);
    }
    .crt-subtitle { font-family:var(--font-crt); font-size:1.25rem; color:rgba(136,238,136,.6); letter-spacing:2px; margin-top:1rem; margin-bottom:2rem; }
    .crt-stats { display:flex; justify-content:center; gap:2.5rem; margin-bottom:1.5rem; flex-wrap:wrap; }
    .crt-stat { text-align:center; font-family:var(--font-crt); }
    .crt-stat-value { font-size:2rem; color:var(--green-crt); text-shadow:0 0 12px rgba(136,238,136,.4); }
    .crt-stat-label { font-size:.9rem; color:rgba(136,238,136,.45); letter-spacing:1px; }
    .scroll-hint { font-family:var(--font-crt); color:rgba(136,238,136,.5); font-size:1rem; letter-spacing:2px; animation:pulse 2s ease-in-out infinite; position:absolute; bottom:3rem; left:50%; transform:translateX(-50%); z-index:5; }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

    /* ===== GALLERY SECTION ===== */
    .gallery-section { padding:3rem 1.5rem 4rem; max-width:1400px; margin:0 auto; }
    .gallery-header { margin-bottom:1.5rem; display:flex; align-items:center; gap:1rem; }
    .section-tag {
      display:inline-block; font-family:var(--font-mono); font-size:.7rem; letter-spacing:2px;
      text-transform:uppercase; color:var(--green-crt); padding:.3rem .8rem;
      border:1px solid rgba(136,238,136,.25); border-radius:3px; background:rgba(136,238,136,.05);
    }
    .gallery-title { font-size:1.5rem; font-weight:700; color:var(--green-crt); }

    /* ===== MASONRY (JS columns — no reflow) ===== */
    .masonry {
      display:flex; gap:16px; align-items:flex-start;
    }
    .masonry-col {
      flex:1; min-width:0; display:flex; flex-direction:column; gap:16px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .nav { padding:.6rem 1rem; }
      .nav-logo { font-size:1.1rem; letter-spacing:1px; }
      .nav-logo span { font-size:.7rem; }
      .hero { min-height:60vh; padding:5rem 1rem 3rem; }
      .crt-title { white-space:normal; letter-spacing:2px; }
      .crt-subtitle { font-size:1rem; }
      .gallery-section { padding:2rem .8rem 3rem; }
      .masonry { gap:10px; }
      .masonry-col { gap:10px; }
      .card-prompt p { font-size:.7rem; }
      .card-title { font-size:.7rem; }
      .modal { width:96vw; max-height:96vh; }
      .modal-body { padding:1rem 1.2rem 1.5rem; }
      .modal-title { font-size:1.2rem; }
      .modal-prompt-zh, .modal-prompt-revised, .modal-prompt-en { font-size:.82rem; }
    }
    @media (min-width: 601px) and (max-width: 1024px) {
      .gallery-section { padding:2.5rem 1rem 3.5rem; }
      .masonry { gap:12px; }
      .masonry-col { gap:12px; }
    }

    .card {
      margin:0;
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:8px; overflow:hidden; cursor:pointer;
      transition:transform .25s, border-color .25s, box-shadow .25s;
      position:relative;
    }
    /* 用 JS 管理 is-hovered，避免 CSS columns reflow 丢失 :hover */
    .card.is-hovered { border-color:rgba(136,238,136,.5); box-shadow:0 0 0 1px rgba(136,238,136,.2), 0 8px 40px rgba(136,238,136,.15); }

    .card-img-wrap { position:relative; overflow:hidden; }
    .card-img-wrap img { width:100%; display:block; transition:transform .4s; }
    .card.is-hovered .card-img-wrap img { transform:scale(1.03); }

    /* 常驻类型角标 */
    .card-badge {
      position:absolute; top:8px; left:8px; z-index:4;
      font-family:var(--font-mono); font-size:.6rem; letter-spacing:1px; text-transform:uppercase;
      padding:.15rem .45rem; border-radius:3px;
      backdrop-filter:blur(6px);
    }
    .card-badge.t2i   { color:var(--green-crt); background:rgba(10,40,10,.7); border:1px solid rgba(136,238,136,.3); }
    .card-badge.editing { color:var(--green-crt); background:rgba(10,40,10,.7); border:1px solid rgba(136,238,136,.3); }
    .card-badge.other { color:var(--green-crt); background:rgba(10,40,10,.7); border:1px solid rgba(136,238,136,.3); }

    /* number collision overlay */
    .card-nums {
      position:absolute; inset:0; pointer-events:none; z-index:2;
    }
    .num-particle {
      position:absolute; font-family:var(--font-crt);
      color:var(--green-crt); font-size:1.1rem;
      text-shadow:0 0 8px rgba(136,238,136,.7);
      will-change:transform; transition:none;
    }

    /* prompt overlay — 绝对定位在图片底部，不撑开卡片高度 */
    .card-prompt {
      position:absolute; bottom:0; left:0; right:0; z-index:3;
      padding:0 1rem;
      max-height:0; overflow:hidden;
      background:linear-gradient(to top, rgba(4,10,4,.97) 0%, rgba(4,10,4,.88) 70%, transparent 100%);
      transition:max-height .35s ease, padding .35s ease;
      border-radius:0 0 8px 8px;
    }
    .card.is-hovered .card-prompt { max-height:180px; padding:.6rem 1rem .9rem; }
    .card-prompt p {
      font-size:.78rem; color:rgba(136,238,136,.85); line-height:1.55;
    }
    .card-title { font-size:.78rem; font-weight:600; color:var(--green-crt); margin-bottom:.25rem; }

    /* ===== LOAD MORE / SPINNER ===== */
    #loadMore { text-align:center; padding:2rem 0; }
    .spinner {
      display:inline-block; width:28px; height:28px;
      border:2px solid var(--border); border-top-color:var(--green-crt);
      border-radius:50%; animation:spin .7s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }
    .load-end { font-family:var(--font-crt); color:rgba(136,238,136,.5); letter-spacing:2px; font-size:1rem; }

    /* ===== MODAL ===== */
    .modal-overlay {
      position:fixed; inset:0; z-index:2000; display:flex; align-items:center; justify-content:center;
      background:rgba(4,10,4,.92); backdrop-filter:blur(8px);
      opacity:0; pointer-events:none; transition:opacity .25s;
    }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal {
      position:relative; max-width:900px; width:92vw; max-height:92vh; overflow-y:auto;
      background:var(--bg-card); border:1px solid rgba(136,238,136,.2);
      border-radius:12px; padding:0;
      transform:scale(.95); transition:transform .25s;
      scrollbar-width:thin; scrollbar-color:var(--green-dim) transparent;
    }
    .modal-overlay.open .modal { transform:scale(1); }
    .modal-img { width:100%; display:block; max-height:60vh; object-fit:contain; background:#000; border-radius:12px 12px 0 0; }
    .modal-body { padding:1.5rem 2rem 2rem; }
    .modal-title { font-family:var(--font-crt); font-size:1.5rem; color:var(--green-crt); margin-bottom:.3rem; }
    .modal-type { font-family:var(--font-mono); font-size:.7rem; color:var(--green-crt); letter-spacing:1px; text-transform:uppercase; margin-bottom:.8rem; }
    .modal-label { font-family:var(--font-mono); font-size:.7rem; color:rgba(136,238,136,.5); letter-spacing:2px; text-transform:uppercase; margin:.8rem 0 .3rem; display:inline-block; }
    .copy-btn {
      display:inline-flex; align-items:center; justify-content:center;
      width:22px; height:22px; margin-left:.5rem; vertical-align:middle;
      background:transparent; border:1px solid rgba(136,238,136,.25);
      color:rgba(136,238,136,.5); border-radius:3px; cursor:pointer;
      transition:all .2s; position:relative; top:-1px;
    }
    .copy-btn:hover { border-color:var(--green-crt); color:var(--green-crt); background:rgba(136,238,136,.08); }
    .copy-btn.copied { border-color:var(--green-crt); color:var(--green-crt); }
    .copy-btn svg { width:13px; height:13px; }
    .modal-prompt-zh {
      font-size:.88rem; color:rgba(136,238,136,.5); line-height:1.7;
      white-space:pre-wrap; word-break:break-all;
      user-select:text; -webkit-user-select:text;
      background:rgba(136,238,136,.03); border-left:2px solid rgba(136,238,136,.15);
      padding:.6rem .8rem; border-radius:0 4px 4px 0;
      font-style:italic;
    }
    .modal-prompt-revised {
      font-size:1rem; color:rgba(136,238,136,.85); line-height:1.8;
      white-space:pre-wrap; word-break:break-all;
      user-select:text; -webkit-user-select:text;
      background:rgba(136,238,136,.03); border-left:2px solid rgba(136,238,136,.25);
      padding:.6rem .8rem; border-radius:0 4px 4px 0;
    }
    .modal-prompt-en {
      font-size:.88rem; color:rgba(136,238,136,.6); line-height:1.7;
      white-space:pre-wrap; word-break:break-all;
      user-select:text; -webkit-user-select:text;
      background:rgba(136,238,136,.03); border-left:2px solid rgba(136,238,136,.2);
      padding:.6rem .8rem; border-radius:0 4px 4px 0;
      font-style:italic;
    }
    .modal-source { display:inline-flex; align-items:center; gap:.4rem; margin-top:1rem; font-size:.8rem; color:var(--green-crt); }
    .modal-author-row { display:flex; align-items:center; gap:.8rem; margin-top:.8rem; }
    .modal-author-link { font-family:var(--font-mono); font-size:.82rem; color:var(--green-crt); text-decoration:none; border-bottom:1px solid rgba(136,238,136,.3); padding-bottom:1px; transition:border-color .2s; }
    .modal-author-link:hover { border-color:var(--green-crt); }
    .modal-close {
      position:absolute; top:1rem; right:1rem; z-index:10;
      background:rgba(10,10,15,.8); border:1px solid var(--border);
      color:var(--text-dim); font-size:1.2rem; width:32px; height:32px;
      border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all .2s;
    }
    .modal-close:hover { border-color:var(--green-crt); color:var(--green-crt); }
    .modal-title-row {
      display:flex; align-items:center; justify-content:space-between; gap:.8rem; margin-bottom:.3rem;
    }
    .lang-toggle {
      flex-shrink:0;
      background:rgba(10,10,15,.8); border:1px solid rgba(136,238,136,.3);
      color:var(--green-crt); font-family:var(--font-crt);
      padding:.15rem .55rem; border-radius:4px; cursor:pointer;
      letter-spacing:1px; transition:all .2s;
      text-shadow:0 0 6px rgba(136,238,136,.3);
      line-height:1.2;
    }
    .lang-toggle .lang-zh { font-size:.82rem; }
    .lang-toggle .lang-en { font-size:.88rem; font-weight:bold; }
    .lang-toggle .lang-sep { font-size:.72rem; opacity:.5; margin:0 1px; }
    .lang-toggle:hover {
      border-color:var(--green-crt);
      background:rgba(136,238,136,.1);
      text-shadow:0 0 10px rgba(136,238,136,.5);
    }

    /* ===== FOOTER ===== */
    footer { text-align:center; padding:2rem; font-family:var(--font-mono); font-size:.75rem; color:rgba(136,238,136,.5); border-top:1px solid var(--border); }
  </style>
</head>

<script>
/* ============================================================
   HERO CANVAS — constellation background with twinkling stars
   ============================================================ */
(function(){
  const canvas = document.getElementById('heroCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H, stars = [], constellations = [];

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = canvas.parentElement.offsetHeight || window.innerHeight;
    initStars();
  }

  function initStars(){
    stars = [];
    const count = Math.floor((W * H) / 3500);
    for(let i = 0; i < count; i++){
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.6 + 0.4,
        baseAlpha: Math.random() * 0.6 + 0.35,
        twinkleSpeed: Math.random() * 0.06 + 0.015,
        twinkleOffset: Math.random() * Math.PI * 2,
        bright: Math.random() < 0.55  // 55% of stars twinkle noticeably
      });
    }
    // build constellation lines — connect nearby stars
    constellations = [];
    const maxDist = Math.min(W, H) * 0.12;
    for(let i = 0; i < stars.length; i++){
      let connections = 0;
      for(let j = i + 1; j < stars.length && connections < 2; j++){
        const dx = stars[i].x - stars[j].x;
        const dy = stars[i].y - stars[j].y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if(d < maxDist && Math.random() < 0.15){
          constellations.push([i, j, d]);
          connections++;
        }
      }
    }
  }

  let t = 0;
  function loop(){
    ctx.clearRect(0, 0, W, H);
    t++;

    // draw constellation lines
    for(const [i, j, d] of constellations){
      const si = stars[i], sj = stars[j];
      const ai = si.baseAlpha * (0.7 + 0.3 * Math.sin(t * si.twinkleSpeed + si.twinkleOffset));
      const aj = sj.baseAlpha * (0.7 + 0.3 * Math.sin(t * sj.twinkleSpeed + sj.twinkleOffset));
      const lineAlpha = Math.min(ai, aj) * 0.3;
      ctx.strokeStyle = `rgba(136,238,136,${lineAlpha})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(si.x, si.y);
      ctx.lineTo(sj.x, sj.y);
      ctx.stroke();
    }

    // draw stars
    for(const s of stars){
      let alpha = s.baseAlpha;
      if(s.bright){
        const wave = Math.sin(t * s.twinkleSpeed + s.twinkleOffset);
        alpha *= (0.15 + 0.85 * (wave * 0.5 + 0.5));
      } else {
        alpha *= (0.5 + 0.5 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset));
      }
      // star glow
      if(s.r > 1.2){
        const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 3);
        grad.addColorStop(0, `rgba(136,238,136,${alpha * 0.4})`);
        grad.addColorStop(1, `rgba(136,238,136,0)`);
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2); ctx.fill();
      }
      // star core
      ctx.fillStyle = `rgba(200,255,200,${alpha})`;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    }

    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', resize);
  window.addEventListener('load', ()=>{ resize(); loop(); });
})();

/* ============================================================
   CARD number scatter on hover (per-card canvas)
   ============================================================ */
function attachCardEffect(card, imgEl){
  const wrap = card.querySelector('.card-img-wrap');
  const overlay = card.querySelector('.card-nums');
  let particles = [], raf = null, entered = false;
  const CHARS = '0123456789';

  function spawnParticles(){
    particles = [];
    const W = wrap.offsetWidth, H = wrap.offsetHeight;
    for(let i=0;i<28;i++){
      particles.push({
        x: Math.random()*W, y: Math.random()*H,
        vx:(Math.random()-.5)*6, vy:(Math.random()-.5)*6,
        alpha:1, char:CHARS[Math.floor(Math.random()*10)],
        el: null
      });
    }
    overlay.innerHTML='';
    for(const p of particles){
      const span = document.createElement('span');
      span.className='num-particle';
      span.textContent = p.char;
      span.style.left = p.x+'px';
      span.style.top  = p.y+'px';
      overlay.appendChild(span);
      p.el = span;
    }
  }

  function animateParticles(){
    let allDone = true;
    for(const p of particles){
      p.x += p.vx; p.y += p.vy;
      p.vx *= .92; p.vy *= .92;
      p.alpha -= .018;
      if(p.alpha>0) allDone=false;
      p.el.style.left = p.x+'px';
      p.el.style.top  = p.y+'px';
      p.el.style.opacity = Math.max(0,p.alpha);
    }
    if(!allDone) raf = requestAnimationFrame(animateParticles);
  }

  card.addEventListener('mouseenter', ()=>{
    if(raf) cancelAnimationFrame(raf);
    spawnParticles();
    raf = requestAnimationFrame(animateParticles);
  });
}

/* ============================================================
   INFINITE SCROLL GALLERY
   ============================================================ */
let page = 1, loading = false, done = false;
const masonry = document.getElementById('masonry');
let cols = [];
let colCount = 0;
const loadMore = document.getElementById('loadMore');

function getColCount(){
  const w = window.innerWidth;
  if(w <= 600) return 2;
  if(w <= 1024) return 3;
  return 4;
}

function buildCols(){
  const need = getColCount();
  if(need === colCount && cols.length === need) return;
  colCount = need;
  // gather all existing cards in order
  const cards = [];
  cols.forEach(c => {
    for(const ch of c.children) cards.push(ch);
  });
  masonry.innerHTML = '';
  cols = [];
  for(let i = 0; i < colCount; i++){
    const div = document.createElement('div');
    div.className = 'masonry-col';
    masonry.appendChild(div);
    cols.push(div);
  }
  // redistribute cards
  let ci = 0;
  for(const card of cards){
    cols[ci % colCount].appendChild(card);
    ci++;
  }
}

function getShortestCol(){
  let min = Infinity, idx = 0;
  cols.forEach((c,i)=>{ const h = c.offsetHeight; if(h < min){ min=h; idx=i; } });
  return cols[idx];
}

let allData = [];
const PAGE_SIZE = 12;

function shuffle(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function loadGalleryData(){
  allData = shuffle([...(window.__GALLERY_DATA__ || [])]);
  document.getElementById('totalCount').textContent = allData.length;
}

async function fetchPage(){
  if(loading || done) return;
  loading = true;
  loadMore.innerHTML = '<div class="spinner"></div>';
  try {
    if(allData.length === 0) loadGalleryData();
    const start = (page - 1) * PAGE_SIZE;
    const items = allData.slice(start, start + PAGE_SIZE);
    if(items.length === 0){ done = true; loadMore.innerHTML = '<div class="load-end">— END OF COLLECTION —</div>'; loading = false; return; }
    await renderCards(items);
    page++;
    if(start + PAGE_SIZE >= allData.length){
      done = true;
      loadMore.innerHTML = '<div class="load-end">— END OF COLLECTION —</div>';
    } else {
      loadMore.innerHTML = '';
    }
  } catch(e){
    loadMore.innerHTML = '<div class="load-end" style="color:#ff4444">LOAD ERROR</div>';
  }
  loading = false;
}

async function renderCards(items){
  for(const item of items){
    const card = document.createElement('div');
    card.className = 'card';
    const badgeClass = item.type === 't2i' || item.type === 'editing' ? 't2i' : 'other';
    const badgeLabel = (item.type === 't2i' || item.type === 'editing') ? 'T2I' : (item.type || '');
    card.innerHTML = `
      <div class="card-img-wrap">
        <img src="${item.image || 'https://nlp-sr-share.bj.bcebos.com/liujiaxiang/workfiles/ernieimageprompt/images/' + item.filename}" alt="${item.title||''}"/>
        ${badgeLabel ? `<span class="card-badge ${badgeClass}">${badgeLabel}</span>` : ''}
        <div class="card-nums"></div>
        <div class="card-prompt">
          ${(item.title_en || item.title) ? `<div class="card-title">${item.title_en || item.title}</div>` : ''}
          <p>${item.revised_prompt_en || item.prompt_en || item.prompt}</p>
        </div>
      </div>`;

    card.addEventListener('mouseenter', () => card.classList.add('is-hovered'));
    card.addEventListener('mouseleave', () => card.classList.remove('is-hovered'));
    card.addEventListener('touchstart', () => card.classList.add('is-hovered'), {passive:true});
    card.addEventListener('touchend', () => setTimeout(()=> card.classList.remove('is-hovered'), 300), {passive:true});

    attachCardEffect(card, card.querySelector('img'));
    card.addEventListener('click', ()=>openModal(item));
    getShortestCol().appendChild(card);

    // 等图片加载完再插下一张，确保列高计算准确
    const img = card.querySelector('img');
    if(img && !img.complete){
      await new Promise(r => { img.onload = r; img.onerror = r; });
    }
  }
}

/* ============================================================
   MODAL
   ============================================================ */
function copyText(elementId){
  const el = document.getElementById(elementId);
  if(!el) return;
  const text = el.textContent;
  navigator.clipboard.writeText(text).then(()=>{
    // Find the copy button that triggered this (it's the button right before this element)
    const btn = el.parentElement.querySelector('.copy-btn[onclick*="'+elementId+'"]');
    if(btn){
      btn.classList.add('copied');
      const orig = btn.innerHTML;
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';
      setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML = orig; }, 1500);
    }
  });
}
const overlay = document.getElementById('modalOverlay');
const modalClose = document.getElementById('modalClose');
let currentLang = localStorage.getItem('galleryLang') || 'zh';
let currentItem = null;

function applyLang(lang){
  currentLang = lang;
  localStorage.setItem('galleryLang', lang);
  document.getElementById('modalLangZh').style.display = lang === 'zh' ? 'block' : 'none';
  document.getElementById('modalLangEn').style.display = lang === 'en' ? 'block' : 'none';
  const btn = document.getElementById('langToggle');
  const zhO = lang === 'zh' ? '1' : '.4';
  const enO = lang === 'en' ? '1' : '.4';
  btn.innerHTML = '<span class="lang-zh" style="opacity:'+zhO+'">中</span><span class="lang-sep">/</span><span class="lang-en" style="opacity:'+enO+'">EN</span>';
  if(currentItem){
    const titleEl = document.getElementById('modalTitle');
    titleEl.textContent = lang === 'en' ? (currentItem.title_en || currentItem.title || `#${currentItem.index}`) : (currentItem.title || `#${currentItem.index}`);
  }
}

document.getElementById('langToggle').addEventListener('click', ()=>{
  applyLang(currentLang === 'zh' ? 'en' : 'zh');
});

function openModal(item){
  currentItem = item;
  document.getElementById('modalImg').src = item.image || `https://nlp-sr-share.bj.bcebos.com/liujiaxiang/workfiles/ernieimageprompt/images/${item.filename}`;
  document.getElementById('modalType').textContent = '// ' + (item.type || 'T2I').toUpperCase();
  document.getElementById('modalTitle').textContent = item.title || `#${item.index}`;

  // Chinese prompts: PROMPT = revised_prompt (detailed), REVISED PROMPT = user's original prompt
  document.getElementById('modalPromptZh').textContent = item.revised_prompt || item.prompt;
  const revisedZh = document.getElementById('modalRevisedWrapZh');
  if(item.prompt && item.prompt.trim() && item.revised_prompt && item.revised_prompt.trim()){
    document.getElementById('modalRevisedPromptZh').textContent = item.prompt_zh || item.prompt;
    revisedZh.style.display = 'block';
  } else {
    revisedZh.style.display = 'none';
  }

  // English prompts: PROMPT = revised_prompt_en (detailed), REVISED PROMPT = user's original prompt_en
  document.getElementById('modalPromptEn').textContent = item.revised_prompt_en || item.prompt_en || '';
  const revisedEn = document.getElementById('modalRevisedWrapEn');
  if(item.prompt_en && item.prompt_en.trim() && item.revised_prompt_en && item.revised_prompt_en.trim()){
    document.getElementById('modalRevisedPromptEn').textContent = item.prompt_en;
    revisedEn.style.display = 'block';
  } else {
    revisedEn.style.display = 'none';
  }

  applyLang(currentLang);

  // source
  const src = document.getElementById('modalSource');
  if(item.source){
    src.href = item.source; src.style.display='inline-flex';
  } else { src.style.display='none'; }
  // author
  const authorEl = document.getElementById('modalAuthor');
  const authorRow = document.getElementById('modalAuthorRow');
  if(item.author){
    authorEl.textContent = item.author;
    if(item.author_link){
      authorEl.href = item.author_link;
      authorEl.target = '_blank';
      authorEl.style.cursor = 'pointer';
      authorEl.style.borderBottom = '';
      authorEl.style.pointerEvents = '';
    } else {
      authorEl.removeAttribute('href');
      authorEl.removeAttribute('target');
      authorEl.style.cursor = 'default';
      authorEl.style.borderBottom = 'none';
      authorEl.style.pointerEvents = 'none';
    }
    authorRow.style.display = 'flex';
  } else {
    authorRow.style.display = 'none';
  }
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  overlay.classList.remove('open');
  document.body.style.overflow='';
}
modalClose.addEventListener('click', closeModal);
overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

/* ============================================================
   INTERSECTION OBSERVER + SCROLL 兜底
   ============================================================ */
const observer = new IntersectionObserver(entries=>{
  if(entries[0].isIntersecting && !loading && !done) fetchPage();
}, { threshold: 0.1 });
observer.observe(loadMore);

// 滚到底部附近也触发加载（兜底）
window.addEventListener('scroll', ()=>{
  if(loading || done) return;
  const distToBottom = document.documentElement.scrollHeight - window.scrollY - window.innerHeight;
  if(distToBottom < 300) fetchPage();
}, { passive: true });

// build responsive columns & kick off
buildCols();
let resizeTimer;
window.addEventListener('resize', ()=>{
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(buildCols, 200);
});
fetchPage();
</script>
